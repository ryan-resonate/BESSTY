<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WTG + BESS Noise Modeller</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

<style>
  :root{
    --ink:#2A2A2A;
    --ink-soft:#3a3a3a;
    --mid:#8E8E8E;
    --light:#D9D9D9;
    --paper:#ffffff;
    --paper-2:#f5f5f5;
    --paper-3:#ECECEC;
    --yellow:#F2CB00;
    --yellow-tint:#FFF7C2;
    --red:#C0392B;
    --green:#2E7D32;
    --blue:#1F6FB2;
    --shadow-1: 0 1px 2px rgba(0,0,0,.06), 0 1px 1px rgba(0,0,0,.04);
    --shadow-2: 0 2px 6px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --shadow-3: 0 8px 24px rgba(0,0,0,.10), 0 2px 6px rgba(0,0,0,.06);
    --r-sm:4px;
    --r-md:6px;
    --r-lg:8px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--paper);color:var(--ink);
    font-family: Arial, Helvetica, sans-serif; font-size:13px;}
  body{overflow:hidden}
  button{font-family:inherit;font-size:inherit}
  input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}

  /* HEADER */
  header.app{
    height:54px;background:var(--yellow);
    border-bottom:1px solid var(--ink);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 18px;position:relative;z-index:600;
  }
  header.app .left{display:flex;align-items:center;gap:14px}
  header.app .logo-wrap{
    height:28px;display:inline-flex;align-items:center;
  }
  header.app .logo-wrap img,
  header.app .logo-wrap object,
  header.app .logo-wrap .logo-fallback{
    height:28px;display:block;
  }
  .logo-fallback{
    font-family:Arial,sans-serif;font-weight:700;font-size:18px;letter-spacing:.5px;
    color:var(--ink);display:inline-flex;align-items:center;gap:8px;
  }
  .logo-fallback::before{
    content:'';width:18px;height:18px;background:var(--ink);
    -webkit-mask:radial-gradient(circle at 50% 60%, transparent 28%, #000 30%);
            mask:radial-gradient(circle at 50% 60%, transparent 28%, #000 30%);
  }
  header.app .pipe{width:1px;height:26px;background:rgba(0,0,0,.4)}
  header.app h1{
    font-family:Arial,sans-serif;font-weight:700;font-size:16px;margin:0;
    letter-spacing:.2px;color:var(--ink);
    display:flex;align-items:center;gap:10px;
  }
  header.app nav{display:flex;gap:4px;align-items:center}
  header.app nav button{
    background:transparent;border:1px solid transparent;
    padding:6px 12px;border-radius:var(--r-md);
    cursor:pointer;color:var(--ink);font-weight:600;font-size:12.5px;
  }
  header.app nav button:hover{background:rgba(0,0,0,.08)}
  header.app nav button.active{background:var(--paper);border-color:rgba(0,0,0,.15)}
  .header-right{display:flex;gap:8px;align-items:center}
  .ic-btn{
    width:32px;height:32px;border:1px solid rgba(0,0,0,.2);background:var(--paper);
    border-radius:var(--r-md);display:inline-flex;
    align-items:center;justify-content:center;cursor:pointer;
    font-size:14px;
  }
  .ic-btn:hover{background:var(--paper-2)}
  .avatar{
    width:30px;height:30px;border-radius:50%;background:var(--ink);color:var(--yellow);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;
  }

  .app-body{
    display:grid;grid-template-columns: 380px 1fr;height:calc(100vh - 54px);
  }

  /* SIDE PANEL */
  aside.side{
    border-right:1px solid var(--light);background:var(--paper);
    display:flex;flex-direction:column;overflow:hidden;position:relative;
  }
  .side-head{
    padding:12px 16px 10px;border-bottom:1px solid var(--light);
    display:flex;justify-content:space-between;align-items:center;
  }
  .side-head h2{margin:0;font-size:14px;font-weight:700}
  .side-head .meta{font-size:11px;color:var(--mid);margin-top:2px}

  .side-tabs{
    display:flex;border-bottom:1px solid var(--light);background:var(--paper-2);
    padding:0 8px;gap:0;overflow-x:auto;
  }
  .side-tabs button{
    background:transparent;border:none;border-bottom:2px solid transparent;
    padding:10px 12px;cursor:pointer;color:var(--ink-soft);
    font-size:12px;font-weight:600;white-space:nowrap;
    display:flex;align-items:center;gap:6px;
  }
  .side-tabs button:hover{color:var(--ink)}
  .side-tabs button.active{
    color:var(--ink);border-bottom-color:var(--ink);background:var(--paper);
  }
  .side-tabs button .badge{
    background:var(--ink);color:var(--yellow);
    font-size:10px;padding:1px 5px;border-radius:8px;font-weight:700;
  }
  .side-tabs button.active .badge{background:var(--yellow);color:var(--ink)}

  .side-scroll{
    flex:1;overflow-y:auto;padding:14px 16px 80px;background:var(--paper);
  }
  .side-foot{
    padding:10px 16px;border-top:1px solid var(--light);background:var(--paper-2);
    display:flex;align-items:center;gap:8px;
  }
  .side-foot img{height:18px;opacity:.85}
  .side-foot .small{font-size:10.5px;color:var(--mid);margin-left:auto}

  /* Section accordion */
  .section{margin:0 0 10px;border:1px solid var(--light);border-radius:var(--r-lg);
    background:var(--paper);overflow:hidden;}
  .section > .sec-hd{
    display:flex;align-items:center;justify-content:space-between;
    cursor:pointer;padding:10px 12px;background:var(--paper);
    font-size:13px;font-weight:700;
    border-bottom:1px solid transparent;transition:background .12s;
  }
  .section > .sec-hd:hover{background:var(--paper-2)}
  .section.open > .sec-hd{
    border-bottom-color:var(--light);
    background:var(--paper-2);
  }
  .sec-hd .left{display:flex;align-items:center;gap:8px}
  .sec-hd .chev{display:inline-block;width:10px;color:var(--mid);transition:transform .15s}
  .section.open .chev{transform:rotate(90deg)}
  .sec-hd .pill{
    font-size:10.5px;background:var(--paper-3);color:var(--ink-soft);
    padding:1px 7px;border-radius:10px;font-weight:600;
  }
  .sec-body{ padding:12px;background:var(--paper);}

  /* fields */
  label.fld{display:flex;flex-direction:column;gap:4px;font-size:12px}
  label.fld > span{font-weight:600;font-size:11px;color:var(--ink-soft);
    text-transform:uppercase;letter-spacing:.04em;}
  .input,select.input,textarea.input{
    font-size:13px;color:var(--ink);
    background:var(--paper);border:1px solid var(--light);
    border-radius:var(--r-md);padding:6px 8px;outline:none;width:100%;
    transition:border-color .12s, box-shadow .12s;
  }
  .input:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(242,203,0,.35)}
  .input:hover{border-color:var(--mid)}
  textarea.input{resize:vertical;min-height:54px}
  .row{display:flex;gap:8px}
  .row > *{flex:1}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

  .btn{
    font-size:12.5px;font-weight:600;
    background:var(--paper);border:1px solid var(--light);color:var(--ink);
    padding:7px 12px;border-radius:var(--r-md);
    cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    transition:background .12s, border-color .12s;
  }
  .btn:hover{background:var(--paper-2);border-color:var(--mid)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.primary:hover{background:#000}
  .btn.yellow{background:var(--yellow);border-color:var(--yellow);color:var(--ink)}
  .btn.yellow:hover{background:#FFD71F;border-color:#FFD71F}
  .btn.ghost{background:transparent;border-style:dashed}
  .btn.tiny{padding:4px 8px;font-size:11px;font-weight:500}
  .btn.run{background:var(--yellow);border-color:var(--ink);color:var(--ink);
    font-size:13px;font-weight:700;padding:9px 14px;width:100%;justify-content:center;
    box-shadow:var(--shadow-1);}
  .btn.run:hover{background:#FFD71F}
  .btn.danger{color:var(--red);border-color:var(--light)}
  .btn.danger:hover{background:#fff0ee;border-color:var(--red)}

  .chip{
    display:inline-flex;align-items:center;gap:5px;
    border:1px solid var(--light);background:var(--paper);
    padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;color:var(--ink-soft);
  }
  .chip.ok{background:#E5F4E6;border-color:#B8DEBA;color:#1B5E20}
  .chip.warn{background:#FDECEA;border-color:#F5C2BC;color:#7B1F15}
  .chip.yel{background:var(--yellow);border-color:var(--yellow);color:var(--ink)}
  .chip .ddot{width:6px;height:6px;border-radius:50%;background:currentColor}

  /* List items */
  .item{
    display:grid;grid-template-columns:28px 1fr auto;gap:8px;align-items:center;
    border:1px solid var(--light);background:var(--paper);
    border-radius:var(--r-md);
    padding:8px 10px;margin-bottom:6px;font-size:12.5px;
    transition:border-color .12s, background .12s;
  }
  .item:hover{border-color:var(--mid);background:var(--paper-2)}
  .item.selected{border-color:var(--ink);background:var(--yellow-tint);border-width:1px;
    box-shadow:0 0 0 1px var(--ink)}
  .item .glyph{
    width:26px;height:26px;display:flex;align-items:center;justify-content:center;
    background:var(--paper-2);border-radius:var(--r-sm);
  }
  .item .name{font-weight:600;color:var(--ink)}
  .item .meta{font-size:11px;color:var(--mid);margin-top:1px;line-height:1.3}
  .item .x{cursor:pointer;color:var(--mid);font-size:14px;padding:4px;border-radius:4px}
  .item .x:hover{color:var(--red);background:#fff0ee}

  .scribble{
    background:linear-gradient(transparent 80%, var(--yellow) 80%);
    padding:0 2px;
  }

  /* MAP */
  .map-wrap{position:relative;overflow:hidden;background:#cfd6d8;height:100%}
  #map{position:absolute;inset:0;background:#cfd6d8}

  /* Map controls top-right */
  .map-controls{
    position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;
    z-index:500;
  }
  .map-controls .grp{
    background:var(--paper);border:1px solid rgba(0,0,0,.15);
    border-radius:var(--r-md);
    display:flex;flex-direction:column;overflow:hidden;
    box-shadow:var(--shadow-2);
  }
  .map-controls .grp.row-grp{flex-direction:row}
  .map-controls button{
    width:36px;height:36px;background:var(--paper);border:none;
    border-bottom:1px solid var(--light);
    cursor:pointer;color:var(--ink);font-size:14px;
    display:flex;align-items:center;justify-content:center;
  }
  .map-controls .row-grp button{border-bottom:none;border-right:1px solid var(--light)}
  .map-controls .row-grp button:last-child{border-right:none}
  .map-controls button:last-child{border-bottom:none}
  .map-controls button:hover{background:var(--yellow-tint)}
  .map-controls button.active{background:var(--yellow);font-weight:700}

  .compass{
    width:54px;height:54px;background:var(--paper);border:1px solid rgba(0,0,0,.15);
    border-radius:50%;display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow-2);position:relative;
  }
  .compass .needle{
    position:absolute;width:6px;height:38px;left:50%;top:50%;
    transform-origin:50% 50%;transform:translate(-50%,-50%);
  }
  .compass .needle .n{position:absolute;top:0;left:0;right:0;height:19px;background:var(--red);clip-path:polygon(50% 0,100% 100%,0 100%);}
  .compass .needle .s{position:absolute;bottom:0;left:0;right:0;height:19px;background:var(--ink);clip-path:polygon(0 0,100% 0,50% 100%);}
  .compass .lbl{position:absolute;font-size:10px;font-weight:700;color:var(--ink-soft)}
  .compass .lbl.n{top:1px}
  .compass .lbl.s{bottom:1px}
  .compass .lbl.e{right:3px;top:50%;transform:translateY(-50%)}
  .compass .lbl.w{left:3px;top:50%;transform:translateY(-50%)}

  /* Legend */
  .legend{
    position:absolute;left:14px;bottom:14px;z-index:500;
    background:var(--paper);border:1px solid rgba(0,0,0,.15);
    border-radius:var(--r-md);
    padding:10px 12px;font-size:11.5px;
    box-shadow:var(--shadow-2);min-width:180px;
  }
  .legend .ttl{font-weight:700;font-size:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
  .legend .ttl .unit{font-size:10.5px;color:var(--mid);font-weight:500}
  .legend .scale{display:flex;flex-direction:column;gap:3px;font-size:11px}
  .legend .scale .row{display:grid;grid-template-columns:18px 1fr;gap:8px;align-items:center}
  .legend .swatch{width:18px;height:14px;border:1px solid rgba(0,0,0,.2);border-radius:2px}
  .legend .recv-row{display:grid;grid-template-columns:18px 1fr;gap:8px;align-items:center;margin-top:4px}
  .legend .recv-dot-mini{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--paper);margin-left:3px;
    box-shadow:0 0 0 1.5px rgba(0,0,0,.4)}

  /* Map status bar */
  .map-status{
    position:absolute;left:14px;top:14px;z-index:500;display:flex;gap:8px;
  }
  .map-status .pill{
    background:var(--paper);border:1px solid rgba(0,0,0,.15);
    border-radius:var(--r-md);
    padding:6px 10px;font-size:12px;
    box-shadow:var(--shadow-2);
    display:inline-flex;align-items:center;gap:6px;
  }
  .map-status .pill b{font-weight:700}
  .map-status .pill .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green)}
  .map-status .pill .dot.warn{background:var(--yellow);border:1px solid rgba(0,0,0,.3)}

  /* Bottom toolbar */
  .bottom-tools{
    position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
    display:flex;gap:8px;z-index:500;
  }
  .bottom-tools .grp{
    background:var(--paper);border:1px solid rgba(0,0,0,.15);
    border-radius:var(--r-md);
    display:flex;overflow:hidden;box-shadow:var(--shadow-2);
  }
  .bottom-tools button{
    background:transparent;border:none;border-right:1px solid var(--light);
    padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;gap:6px;color:var(--ink-soft);
  }
  .bottom-tools button:last-child{border-right:none}
  .bottom-tools button:hover{background:var(--yellow-tint);color:var(--ink)}
  .bottom-tools button.active{background:var(--yellow);color:var(--ink)}
  .bottom-tools .icon{font-size:14px}

  /* 3D placeholder */
  #threed-overlay{
    position:absolute;inset:0;z-index:450;display:none;
    background:
      linear-gradient(180deg, rgba(42,42,42,0.0) 0%, rgba(42,42,42,0.20) 60%, rgba(42,42,42,0.45) 100%),
      radial-gradient(circle at 30% 40%, rgba(110,80,30,.5), transparent 60%),
      radial-gradient(circle at 70% 65%, rgba(70,55,25,.5), transparent 50%),
      #1f1f1f;
  }
  #threed-overlay.on{display:block}
  #threed-overlay svg{position:absolute;inset:0;width:100%;height:100%}
  #threed-overlay .stamp{
    position:absolute;left:50%;top:14px;transform:translateX(-50%);
    background:rgba(255,255,255,.92);color:var(--ink);
    font-size:11px;font-weight:600;letter-spacing:.04em;
    padding:6px 12px;border-radius:var(--r-md);box-shadow:var(--shadow-2);
    text-transform:uppercase;
  }

  /* Leaflet tweaks */
  .leaflet-container{font-family:Arial,sans-serif!important;background:#dde3e6}
  .leaflet-control-zoom{display:none!important}
  .leaflet-control-attribution{
    background:rgba(255,255,255,.85)!important;font-size:10px!important;
  }
  .leaflet-tooltip{font-size:12px;padding:6px 9px;border-radius:var(--r-md);box-shadow:var(--shadow-2)}

  /* Markers */
  .wtg-marker, .bess-marker, .recv-marker { pointer-events:auto; cursor:grab; }
  .leaflet-marker-draggable.leaflet-drag-target,
  .wtg-marker:active, .bess-marker:active, .recv-marker:active { cursor:grabbing; }

  .wtg-noise-circle{
    border:1px dashed rgba(42,42,42,.5);border-radius:50%;
    pointer-events:none;
    background:radial-gradient(circle, rgba(242,203,0,0.12) 0%, rgba(242,203,0,0.03) 70%, transparent 100%);
  }

  .recv-marker{display:flex;flex-direction:column;align-items:center;gap:1px;
    transform:translate(-50%,-100%);}
  .recv-label{
    font-size:10.5px;background:var(--paper);
    border:1px solid rgba(0,0,0,.25);padding:1px 5px;border-radius:3px;line-height:1.2;
    white-space:nowrap;font-weight:600;
    box-shadow:0 1px 1px rgba(0,0,0,.06);
  }
  .recv-label.id{font-size:9.5px;color:var(--mid);font-weight:500;border-color:rgba(0,0,0,.15)}
  .recv-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--paper);
    background:var(--green);box-shadow:0 0 0 1.5px rgba(0,0,0,.5), 0 1px 2px rgba(0,0,0,.3);}
  .recv-dot.fail{background:var(--red)}

  /* Calc area corner handles */
  .area-handle{
    width:12px;height:12px;background:var(--paper);border:2px solid var(--ink);
    border-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,.3);
    transform:translate(-50%,-50%);
  }
  .area-handle.rot{border-radius:50%;background:var(--yellow)}

  /* Toast */
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:700;
    background:var(--ink);color:#fff;padding:9px 14px;border-radius:var(--r-md);
    font-size:12.5px;box-shadow:var(--shadow-3);
    display:flex;align-items:center;gap:8px;
  }
  .toast .ddot{width:7px;height:7px;border-radius:50%;background:var(--yellow)}

  hr.dim{border:none;border-top:1px solid var(--light);margin:10px 0}
  .muted{color:var(--mid)}
  .tiny{font-size:11px}
  .mono{font-family:'SFMono-Regular',Menlo,monospace}
  .num{font-variant-numeric:tabular-nums}
  .hint{font-size:11.5px;color:var(--mid);font-style:italic}

  /* Drag-drop file zone */
  .dropzone{
    border:1.5px dashed var(--light);background:var(--paper-2);
    padding:16px 12px;text-align:center;border-radius:var(--r-md);
    transition:border-color .12s, background .12s;cursor:pointer;
  }
  .dropzone:hover{border-color:var(--yellow);background:var(--yellow-tint)}
  .dropzone .ic{font-size:22px;color:var(--mid);margin-bottom:4px}

  /* Range input */
  input[type="range"]{
    -webkit-appearance:none;appearance:none;width:100%;height:4px;
    background:var(--light);border-radius:2px;outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--yellow);border:1.5px solid var(--ink);cursor:pointer;
    box-shadow:0 1px 2px rgba(0,0,0,.2);
  }
  input[type="range"]::-moz-range-thumb{
    width:14px;height:14px;border-radius:50%;background:var(--yellow);
    border:1.5px solid var(--ink);cursor:pointer;
  }

  /* Checkbox styling */
  input[type="checkbox"]{accent-color:var(--ink)}

  /* Layer toggle row */
  .layer-row{
    display:flex;align-items:center;gap:8px;padding:8px 10px;
    border:1px solid var(--light);border-radius:var(--r-md);background:var(--paper);
    margin-bottom:6px;font-size:12.5px;
  }
  .layer-row .ttl{flex:1;font-weight:600}
  .layer-row .meta{font-size:11px;color:var(--mid)}
  .layer-row.disabled .ttl{color:var(--mid)}

  /* Source tab inner accordion subtle */
  .section.nest{border-color:var(--light);box-shadow:var(--shadow-1)}

  /* watermark logo */
  .wm-logo{position:fixed;right:14px;bottom:84px;height:18px;opacity:.6;z-index:300;pointer-events:none}

  /* Logo inversion: SVG yellow on yellow header — use filter to ensure contrast */
  .header-logo-img{ height:28px; }
</style>
</head>
<body>

<script>
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "panelLayout": "twolevel",
    "receiverStyle": "dot",
    "mapStyle": "satellite",
    "bessStyle": "container",
    "contourPalette": "viridis"
  }/*EDITMODE-END*/;
</script>

<div id="root"></div>

<!-- React + Babel -->
